name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: deploy-dry-run-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dry-run-release:
    name: Cloud Run dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    env:
      CLOUD_RUN_PROJECT_ID: ci-placeholder-project
      CLOUD_RUN_REGION: asia-northeast1
      CLOUD_RUN_ENV_FILE: configs/cloud-run/ci.env
      CLOUD_RUN_MIN_INSTANCES: "1"
      GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        # deploy_cloud_run.sh の Pydantic 設定検証に必要な依存を事前に入れる。
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install prerequisite CLI packages
        # gcloud は setup-gcloud で導入するため、ここでは openssh-client 等の汎用ツールのみを明示インストールします。
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-client

      - name: Authenticate to Google Cloud
        # サービスアカウントキーはリポジトリシークレット GCP_SA_KEY から取得し、ADC として利用します。
        if: env.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Skip auth when credentials are unavailable
        if: env.GCP_SA_KEY == ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "::notice::Cloud Run dry-run skipped because GCP_SA_KEY is unavailable (likely forked PR). Validation not executed."
          exit 0

      - name: Set up gcloud SDK
        # gcloud CLI を明示的に導入し、プロジェクトとリージョンのコンテキストを合わせます。
        if: env.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.CLOUD_RUN_PROJECT_ID }}
          install_components: beta

      - name: Run release-cloud-run in dry-run mode
        # Firestore インデックス同期は CI では省略し、Cloud Run デプロイフローの設定検証のみを実施します。
        if: env.GCP_SA_KEY != ''
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          make release-cloud-run \
            PROJECT_ID=${{ env.CLOUD_RUN_PROJECT_ID }} \
            REGION=${{ env.CLOUD_RUN_REGION }} \
            ENV_FILE=${{ env.CLOUD_RUN_ENV_FILE }} \
            MIN_INSTANCES=${{ env.CLOUD_RUN_MIN_INSTANCES }} \
            SKIP_FIRESTORE_INDEX_SYNC=true \
            DRY_RUN=true
