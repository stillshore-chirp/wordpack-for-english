name: Dependency review

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - ".github/dependabot.yml"
      - ".github/workflows/**"
      - "Dockerfile"
      - "Dockerfile.*"
      - "package.json"
      - "package-lock.json"
      - "apps/frontend/package.json"
      - "apps/frontend/package-lock.json"
      - "requirements.txt"

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency_review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check Dependency Graph support
        id: dependency_graph
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set +e
          gh api "repos/${GITHUB_REPOSITORY}/dependency-graph/compare/${BASE_SHA}...${HEAD_SHA}" >/tmp/dependency-review-probe.json 2>/tmp/dependency-review-probe.err
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "supported=true" >> "$GITHUB_OUTPUT"
          else
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency review skipped because Dependency graph is not available for this repository yet. Enable it in repository security settings, then this workflow will fail high/critical vulnerable dependency changes."
            cat /tmp/dependency-review-probe.err
          fi

      - name: Checkout repository
        if: steps.dependency_graph.outputs.supported == 'true'
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Review dependency changes
        if: steps.dependency_graph.outputs.supported == 'true'
        uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
          vulnerability-check: true
          license-check: false
          show-patched-versions: true
