name: CI

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security_text_scan:
    name: Security text scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Scan source text for invisible controls
        run: python scripts/security_scan_text.py

  backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FIRESTORE_PROJECT_ID: wordpack-ci
      FIRESTORE_EMULATOR_PORT: 8080
      FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
      ENABLE_FIRESTORE_EMULATOR: "true"
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install langgraph

      - name: Run pytest
        env:
          PYTHONPATH: apps/backend
        run: |
          if [ "${ENABLE_FIRESTORE_EMULATOR}" = "true" ]; then
            npm install -g firebase-tools@15.22.0
            FIRESTORE_EMULATOR_HOST="127.0.0.1:${FIRESTORE_EMULATOR_PORT}" FIRESTORE_PROJECT_ID="${FIRESTORE_PROJECT_ID}" firebase emulators:exec --only firestore --project "${FIRESTORE_PROJECT_ID}" --config firebase.json "pytest" | cat
          else
            pytest | cat
          fi

  security_headers:
    name: Security headers tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set SESSION_SECRET_KEY for CI
        # Settings 検証で必須のため、CI 実行ごとにランダム値を注入する（実運用の秘密鍵は不要）。
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          print("SESSION_SECRET_KEY=" + secrets.token_hex(32))
          PY

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install langgraph

      - name: Prepare production-like env file for security header checks
        run: cp .env.ci .env

      - name: Run security headers pytest suite
        env:
          PYTHONPATH: apps/backend
        run: pytest -q --no-cov tests/test_security_headers.py

  frontend:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck frontend (including tests)
        run: npx tsc -p tsconfig.json

      - name: Run vitest
        run: npm test -- --coverage --silent

      - name: Check frontend architecture boundaries
        working-directory: ${{ github.workspace }}
        run: npm run check:frontend-architecture

  playwright_smoke:
    name: Playwright smoke (PR critical flows)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs:
      - backend
      - frontend
    # CD の前提チェックとして main push でもスモークを実行し、デプロイ前に主要動線を検証する。
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set SESSION_SECRET_KEY for CI
        # Settings 検証で必須のため、CI 実行ごとにランダム値を注入する（実運用の秘密鍵は不要）。
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          print("SESSION_SECRET_KEY=" + secrets.token_hex(32))
          PY

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install langgraph

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Install Playwright dependencies
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Playwright smoke suite
        # PR では主要導線のみを実行し、短時間で回帰を検知する。
        run: |
          npx playwright test \
            -c tests/e2e/playwright.config.ts \
            tests/e2e/auth.spec.ts \
            tests/e2e/guest.spec.ts \
            tests/e2e/wordpack.spec.ts

      - name: Upload Playwright artifacts
        # 失敗時のスクリーンショット/トレース/HTML レポートを回収する。
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 90
          if-no-files-found: ignore

  cloud_run_guard:
    name: Cloud Run config guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - security_headers
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set SESSION_SECRET_KEY for CI
        # Settings 検証で必須のため、CI 実行ごとにランダム値を注入する（実運用の秘密鍵は不要）。
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
          import secrets
          print("SESSION_SECRET_KEY=" + secrets.token_hex(32))
          PY

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint deploy script
        run: shellcheck scripts/deploy_cloud_run.sh

      - name: Dry-run Cloud Run deployment
        run: ./scripts/deploy_cloud_run.sh --dry-run --env-file configs/cloud-run/ci.env --project-id ci-placeholder-project --region asia-northeast1 --service wordpack-backend --min-instances 1
