name: Deploy to production

on:
  push:
    branches: [ main ]
  # 手動実行のフォールバックを残しておく。
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.workflow }}-${{ github.ref }}
  # canary 中断で traffic split を残さないよう、進行中の本番リリースは完走させて次を待機させる。
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      CLOUD_RUN_PROJECT_ID: ${{ secrets.GCP_SA_PROJECT_ID }}
      CLOUD_RUN_REGION: asia-northeast1
      CLOUD_RUN_SERVICE: wordpack-backend
      CLOUD_RUN_ENV_FILE: .env.deploy
      CLOUD_RUN_MIN_INSTANCES: ${{ vars.CLOUD_RUN_MIN_INSTANCES || '1' }}
      CLOUD_RUN_TRAFFIC_TAG: candidate
      CLOUD_RUN_CANARY_PERCENT: "10"
      CLOUD_RUN_CANARY_ATTEMPTS: "7"
      CLOUD_RUN_CANARY_DELAY_SECONDS: "10"
      CLOUD_RUN_CANARY_REQUESTS_PER_ATTEMPT: "10"
      SKIP_FIRESTORE_INDEX_SYNC: "false"
      FIREBASE_PROJECT_ID: ${{ secrets.GCP_SA_PROJECT_ID }}
      TRIGGER_BRANCH: ${{ github.ref_name }}
      TRIGGER_SHA: ${{ github.sha }}
      GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ env.TRIGGER_SHA }}
          persist-credentials: false

      - name: Materialize production env file
        # シークレットに保存した base64 文字列から .env.deploy を復元し、後続の検証に備える。
        env:
          CLOUD_RUN_ENV_FILE: ${{ env.CLOUD_RUN_ENV_FILE }}
          CLOUD_RUN_ENV_FILE_BASE64: ${{ secrets.CLOUD_RUN_ENV_FILE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUD_RUN_ENV_FILE_BASE64}" ]; then
            echo "::error::CLOUD_RUN_ENV_FILE_BASE64 secret is not set. Add a base64-encoded .env.deploy for production deploys." >&2
            exit 1
          fi

          umask 077
          echo "::add-mask::${CLOUD_RUN_ENV_FILE_BASE64}"
          echo "${CLOUD_RUN_ENV_FILE_BASE64}" | base64 --decode > "${CLOUD_RUN_ENV_FILE}"
          chmod 600 "${CLOUD_RUN_ENV_FILE}"
          echo "Restored ${CLOUD_RUN_ENV_FILE} from CLOUD_RUN_ENV_FILE_BASE64."

      - name: Validate deployment inputs
        # 秘密情報とデプロイ用の環境ファイルが揃っているか事前に検証し、原因が分かりやすい失敗に変換する。
        env:
          CLOUD_RUN_PROJECT_ID: ${{ env.CLOUD_RUN_PROJECT_ID }}
          CLOUD_RUN_ENV_FILE: ${{ env.CLOUD_RUN_ENV_FILE }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          missing=0
          if [ -z "${CLOUD_RUN_PROJECT_ID}" ]; then
            echo "::error::CLOUD_RUN_PROJECT_ID is not set. Register the production project ID as a repository secret or variable." >&2
            missing=1
          fi
          if [ -z "${FIREBASE_PROJECT_ID}" ]; then
            echo "::error::FIREBASE_PROJECT_ID is not set. Register the Firebase project ID as a repository secret or variable." >&2
            missing=1
          fi
          if [ ! -f "${CLOUD_RUN_ENV_FILE}" ]; then
            echo "::error::Deployment env file '${CLOUD_RUN_ENV_FILE}' is missing. Create it based on env.deploy.example and store it securely." >&2
            missing=1
          fi
          if [ -z "${GCP_SA_KEY}" ]; then
            echo "::error::GCP_SA_KEY is not set. Register the production service account key as a repository secret." >&2
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Inputs validated. Proceeding to authenticated deployment."

      - name: Authenticate to Google Cloud with service account key
        # CI 成功後にのみ実行される本番デプロイなので、サービスアカウントキーで明示的に認証する。
        # gcloud / Cloud Run 用の認証は auth action の credentials file を使う。
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud SDK
        # gcloud CLI をプロジェクト/リージョンに合わせて準備する。Cloud Run / Cloud Build は GA コマンドのみ使用。
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.CLOUD_RUN_PROJECT_ID }}

      - name: Set up Node.js for frontend build
        # Firebase Hosting の公開 artifact を作るため Node.js を用意する。
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install frontend dependencies
        # predeploy の tsc が @types などの devDependencies を必要とするため、事前に導入しておく。
        env:
          NPM_CONFIG_PRODUCTION: "false"
        run: npm ci --prefix ./apps/frontend

      - name: Set up Python
        # デプロイスクリプトが python -m apps.backend.backend.config で設定を検証するため Python 環境を用意する。
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        # Pydantic 設定検証など、デプロイ前の dry-run に必要な依存をインストールする。
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare unique deployment marker
        # 同じ commit の再実行でも旧 revision と候補を区別できるよう、実行ごとに新しい marker を生成する。
        run: |
          set -euo pipefail
          DEPLOYMENT_VERSION="$(python -c 'import secrets; print(secrets.token_hex(16))')"
          echo "::add-mask::${DEPLOYMENT_VERSION}"
          echo "DEPLOYMENT_VERSION=${DEPLOYMENT_VERSION}" >> "${GITHUB_ENV}"

      - name: Run production Cloud Run release
        # Firestore インデックス同期の有無は環境変数で制御し、Makefile 側で一元管理する。
        # TOOL=gcloud で gcloud 認証の Firestore Admin API を使い、Firebase CLI と gcloud alpha に依存しない。
        env:
          CLOUD_RUN_PROJECT_ID: ${{ env.CLOUD_RUN_PROJECT_ID }}
          CLOUD_RUN_REGION: ${{ env.CLOUD_RUN_REGION }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_ENV_FILE: ${{ env.CLOUD_RUN_ENV_FILE }}
          CLOUD_RUN_MIN_INSTANCES: ${{ env.CLOUD_RUN_MIN_INSTANCES }}
          CLOUD_RUN_TRAFFIC_TAG: ${{ env.CLOUD_RUN_TRAFFIC_TAG }}
          SKIP_FIRESTORE_INDEX_SYNC: ${{ env.SKIP_FIRESTORE_INDEX_SYNC }}
        run: |
          make release-cloud-run \
            PROJECT_ID="${CLOUD_RUN_PROJECT_ID}" \
            REGION="${CLOUD_RUN_REGION}" \
            SERVICE="${CLOUD_RUN_SERVICE}" \
            ENV_FILE="${CLOUD_RUN_ENV_FILE}" \
            MIN_INSTANCES="${CLOUD_RUN_MIN_INSTANCES}" \
            NO_TRAFFIC=true \
            TRAFFIC_TAG="${CLOUD_RUN_TRAFFIC_TAG}" \
            SKIP_FIRESTORE_INDEX_SYNC="${SKIP_FIRESTORE_INDEX_SYNC}" \
            TOOL=gcloud

      - name: Promote staged Cloud Run revision
        # 本番 Hosting rewrite で候補 version を観測しながら 10% canary を 60 秒確認し、失敗時は直前の traffic 配分へ自動復旧する。
        env:
          CLOUD_RUN_PROJECT_ID: ${{ env.CLOUD_RUN_PROJECT_ID }}
          CLOUD_RUN_REGION: ${{ env.CLOUD_RUN_REGION }}
          CLOUD_RUN_SERVICE: ${{ env.CLOUD_RUN_SERVICE }}
          CLOUD_RUN_TRAFFIC_TAG: ${{ env.CLOUD_RUN_TRAFFIC_TAG }}
          CLOUD_RUN_CANARY_PERCENT: ${{ env.CLOUD_RUN_CANARY_PERCENT }}
          CLOUD_RUN_CANARY_ATTEMPTS: ${{ env.CLOUD_RUN_CANARY_ATTEMPTS }}
          CLOUD_RUN_CANARY_DELAY_SECONDS: ${{ env.CLOUD_RUN_CANARY_DELAY_SECONDS }}
          CLOUD_RUN_CANARY_REQUESTS_PER_ATTEMPT: ${{ env.CLOUD_RUN_CANARY_REQUESTS_PER_ATTEMPT }}
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
        run: |
          scripts/promote_cloud_run_revision.sh \
            --project-id "${CLOUD_RUN_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --service "${CLOUD_RUN_SERVICE}" \
            --tag "${CLOUD_RUN_TRAFFIC_TAG}" \
            --canary-percent "${CLOUD_RUN_CANARY_PERCENT}" \
            --attempts "${CLOUD_RUN_CANARY_ATTEMPTS}" \
            --delay-seconds "${CLOUD_RUN_CANARY_DELAY_SECONDS}" \
            --requests-per-attempt "${CLOUD_RUN_CANARY_REQUESTS_PER_ATTEMPT}" \
            --health-url "https://${FIREBASE_PROJECT_ID}.web.app/api/config" \
            --expected-version "${DEPLOYMENT_VERSION}"

      - name: Deploy Firebase Hosting
        # Cloud Run デプロイ後に Firebase Hosting を更新し、フロントエンドを同じリリースで揃える。
        # Firebase CLI 認証に依存せず、gcloud 認証の Firebase Hosting API で release する。
        env:
          FIREBASE_PROJECT_ID: ${{ env.FIREBASE_PROJECT_ID }}
        run: |
          set -euo pipefail
          npm --prefix ./apps/frontend run build
          python scripts/deploy_firebase_hosting.py \
            --project "${FIREBASE_PROJECT_ID}" \
            --site "${FIREBASE_PROJECT_ID}" \
            --public apps/frontend/dist

      - name: Summarize deployment outcome
        if: ${{ always() }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            STATUS_LABEL="[success]"
          elif [ "$STATUS" = "cancelled" ]; then
            STATUS_LABEL="[cancelled]"
          else
            STATUS_LABEL="[failed]"
          fi

          {
            echo "## Production deployment"
            echo "- Status: ${STATUS_LABEL} ${STATUS}"
            echo "- Commit: ${TRIGGER_SHA}"
            echo "- Trigger branch: ${TRIGGER_BRANCH}"
            echo "- Actor: ${{ github.actor }}"
            echo "- Cloud Run rollout: tagged no-traffic candidate -> ${CLOUD_RUN_CANARY_PERCENT}% canary -> 100%"
            echo "- Canary observation: $(( (CLOUD_RUN_CANARY_ATTEMPTS - 1) * CLOUD_RUN_CANARY_DELAY_SECONDS )) seconds"
            echo "- SKIP_FIRESTORE_INDEX_SYNC: ${SKIP_FIRESTORE_INDEX_SYNC}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup materialized production env file
        if: ${{ always() }}
        env:
          CLOUD_RUN_ENV_FILE: ${{ env.CLOUD_RUN_ENV_FILE }}
        run: |
          rm -f "${CLOUD_RUN_ENV_FILE:-.env.deploy}"
